<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Finish Line — sailing race timer</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finish Line">
<meta name="theme-color" content="#0A1C2E">
<style>
  :root{
    --navy:#0A1C2E; --navy2:#122B44; --line:#24405E; --foam:#F2F6F9;
    --yellow:#FFC845; --orange:#FF6B35; --red:#E23D3D; --green:#43C08A;
    --dim:#8FA6BC; --faint:#3D5A78;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--navy); color:var(--foam);
    font-family:system-ui,-apple-system,sans-serif; overscroll-behavior:none;}
  .wrap{max-width:480px; margin:0 auto; padding:12px 14px 110px;
    padding-top:calc(12px + env(safe-area-inset-top));}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-variant-numeric:tabular-nums;}
  button{font-family:inherit; cursor:pointer; touch-action:manipulation;}
  input{font-family:inherit;}

  .hdr{display:flex; justify-content:space-between; align-items:baseline;
    border-bottom:2px solid var(--navy2); padding-bottom:8px;}
  .eyebrow{font-size:11px; letter-spacing:.22em; color:var(--yellow); font-weight:700;}
  .title{font-size:22px; font-weight:800;}
  .date{font-size:12px; color:var(--dim); text-align:right;}

  .clock{text-align:center; padding:14px 0 4px;}
  .clock .big{font-size:52px; font-weight:700; letter-spacing:.03em; line-height:1;}
  .clock .sub{font-size:14px; color:var(--dim); margin-top:6px; min-height:18px;}
  .clock .sub b{color:var(--yellow);}

  .nameRow{display:flex; gap:8px; align-items:center; margin:6px 0 10px;}
  .nameRow label{font-size:11px; letter-spacing:.15em; color:var(--dim); font-weight:700;}
  .nameInput{flex:1; background:var(--navy2); color:var(--foam); border:1px solid var(--line);
    border-radius:8px; padding:9px 11px; font-size:15px; font-weight:600;}

  .row{display:flex; gap:8px; justify-content:center; margin-bottom:14px;}
  .chip{background:var(--navy2); color:var(--foam); border:1px solid var(--line);
    border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600;}
  .chip.ghost{background:transparent; color:var(--dim); font-weight:400;}
  .chip.on{color:var(--yellow);}

  .markbtn{width:100%; padding:26px 0; border-radius:16px; border:none;
    background:var(--yellow); color:var(--navy); font-size:30px; font-weight:900;
    letter-spacing:.14em; box-shadow:0 6px 0 #B98F1F;}
  .markbtn:active{transform:translateY(3px); box-shadow:0 3px 0 #B98F1F;}
  .hint{text-align:center; font-size:12px; color:var(--dim); margin-top:8px;}
  .hint b{color:var(--orange);}

  .panel{background:var(--navy2); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-top:14px;}
  .panel .top{display:flex; justify-content:space-between; align-items:center;
    font-size:12px; letter-spacing:.15em; color:var(--dim); font-weight:700;}
  .panel .top .t{color:var(--foam);}
  .listen{color:var(--red); font-weight:700; font-size:12px;}
  .speakbtn{color:var(--yellow); background:none; font-weight:700; font-size:13px;
    padding:4px 8px; border:1px solid var(--line); border-radius:6px;}
  .draft{font-size:40px; font-weight:700; text-align:center; padding:10px 0;
    min-height:58px; letter-spacing:.08em;}
  .draft .ph{color:var(--faint);}
  .heard{text-align:center; font-size:12px; color:var(--dim); margin-bottom:6px; min-height:16px;}
  .heard.err{color:var(--orange);}
  .pad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .pad button{padding:14px 0; border-radius:10px; font-size:22px; font-weight:700;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    background:var(--navy); color:var(--foam); border:1px solid var(--line);}
  .pad button.ok{background:var(--yellow); color:var(--navy); border:none;}
  .later{width:100%; margin-top:10px; background:none; border:none;
    color:var(--dim); font-size:13px; padding:6px;}

  .listhdr{display:flex; justify-content:space-between; align-items:center;
    margin:20px 0 6px; gap:8px;}
  .listhdr .lbl{font-size:12px; letter-spacing:.2em; color:var(--dim); font-weight:700; flex:1;}
  .listhdr button{background:none; border:1px solid var(--line); border-radius:6px;
    padding:5px 9px; font-size:12px; font-weight:600;}
  .listhdr .newr{color:var(--green); border-color:#255c46;}
  .listhdr .clr{color:var(--red); border-color:#5c2530;}
  .empty{text-align:center; color:var(--faint); font-size:14px; padding:24px 0;}

  .entry{display:flex; align-items:center; gap:12px; background:var(--navy2);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .entry.pending{background:#3A2A14; border-color:var(--orange);}
  .entry .pos{font-size:13px; color:var(--dim); width:26px;}
  .entry .sail{flex:1; text-align:left; background:none; border:none; color:var(--foam);
    font-size:22px; font-weight:700;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  .entry.pending .sail{color:var(--orange); font-size:16px;}
  .entry .times{text-align:right;}
  .entry .times .t{font-size:16px; font-weight:700;}
  .entry .times .e{font-size:12px; color:var(--yellow);}
  .entry .del{background:none; border:none; color:var(--faint); font-size:18px; padding:0 2px;}

  .arch{margin-top:26px;}
  .arch .h{font-size:12px; letter-spacing:.2em; color:var(--dim); font-weight:700;
    border-top:1px solid var(--navy2); padding-top:14px; margin-bottom:8px;}
  .rcard{display:flex; align-items:center; gap:10px; background:var(--navy2);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .rcard .info{flex:1; min-width:0;}
  .rcard .nm{font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rcard .meta{font-size:12px; color:var(--dim); margin-top:2px;}
  .rcard .exp{background:var(--foam); color:var(--navy); border:none; border-radius:8px;
    padding:8px 12px; font-size:13px; font-weight:700;}
  .rcard .del{background:none; border:none; color:var(--faint); font-size:18px; padding:0 2px;}

  .bar{position:fixed; left:0; right:0; bottom:0; display:flex; gap:8px;
    max-width:480px; margin:0 auto;
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    background:rgba(10,28,46,.96); border-top:1px solid var(--line);}
  .bar .exp{flex:2; background:var(--foam); color:var(--navy); border:none;
    border-radius:10px; padding:13px 0; font-size:15px; font-weight:800;}
  .bar .cpy{flex:1; background:transparent; color:var(--foam);
    border:1px solid var(--line); border-radius:10px; padding:13px 0; font-size:15px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="eyebrow">RACE COMMITTEE</div>
      <div class="title">Finish Line</div>
    </div>
    <div class="date" id="hdrDate"></div>
  </div>

  <div class="clock">
    <div class="big mono" id="clockBig">00:00:00</div>
    <div class="sub mono" id="clockSub">no race start set</div>
  </div>

  <div class="nameRow">
    <label>RACE</label>
    <input class="nameInput" id="raceName" type="text" placeholder="Race name" autocomplete="off" autocapitalize="words">
  </div>

  <div class="row">
    <button class="chip" id="startBtn">Start race now</button>
    <button class="chip" id="voiceBtn" style="display:none">&#127908; voice on</button>
  </div>

  <button class="markbtn" id="markBtn">MARK FINISH</button>
  <div class="hint" id="hint">tap the moment the boat crosses &mdash; time is locked to the second</div>

  <div class="panel" id="panel" style="display:none">
    <div class="top">
      <div>FINISH LOCKED <span class="t mono" id="lockedTime"></span></div>
      <span class="listen" id="listenTag" style="display:none">&#9679; listening&hellip;</span>
      <button class="speakbtn" id="speakBtn" style="display:none">&#127908; speak</button>
    </div>
    <div class="draft mono" id="draft"><span class="ph">sail no.</span></div>
    <div class="heard" id="heard"></div>
    <div class="pad" id="pad"></div>
    <button class="later" id="laterBtn">assign later</button>
  </div>

  <div class="listhdr">
    <div class="lbl" id="countLbl">FINISHES (0)</div>
    <button class="newr" id="newBtn" style="display:none">New race</button>
    <button class="clr" id="clearBtn" style="display:none">Clear</button>
  </div>
  <div id="list"><div class="empty">No finishes yet &mdash; first boat over the line starts the list.</div></div>

  <div class="arch" id="archWrap" style="display:none">
    <div class="h">SAVED RACES</div>
    <div id="archList"></div>
  </div>
</div>

<div class="bar" id="bar" style="display:none">
  <button class="exp" id="exportBtn">Export CSV</button>
  <button class="cpy" id="copyBtn">Copy</button>
</div>

<script>
(function(){
"use strict";
var pad=function(n){return String(n).padStart(2,"0");};
var clockTime=function(ms){var d=new Date(ms);return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());};
var elapsed=function(ms,start){if(!start||ms<start)return"";var s=Math.floor((ms-start)/1000);
  var h=Math.floor(s/3600);s-=h*3600;var m=Math.floor(s/60);s-=m*60;return h+":"+pad(m)+":"+pad(s);};
function el(id){return document.getElementById(id);}
function fmtDate(d){return d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});}
function shortDate(ms){var d=new Date(ms);return d.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];}
function defaultName(n){var d=new Date();return "Race "+n+" \u2014 "+shortDate(d.getTime());}

var WORDS={zero:"0",oh:"0",o:"0",nought:"0",one:"1",won:"1",two:"2",to:"2",too:"2",
  three:"3",four:"4","for":"4",fore:"4",five:"5",six:"6",seven:"7",eight:"8",ate:"8",nine:"9"};
function parseSail(t){
  var out="", ws=t.toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/);
  for(var i=0;i<ws.length;i++){var w=ws[i];if(!w)continue;
    if(/^[0-9]+$/.test(w))out+=w;
    else if(WORDS[w])out+=WORDS[w];
    else if(/^[a-z]{1,3}$/.test(w)&&out==="")out+=w.toUpperCase();}
  return out;
}

var raceName="", raceStart=null, entries=[], archived=[], activeId=null, draft="",
    listening=false, autoListen=true, raceCounter=1;

(function(){
  try{
    var v2=JSON.parse(localStorage.getItem("finishline_v2")||"null");
    if(v2){
      raceName=v2.raceName||""; raceStart=v2.raceStart||null;
      entries=Array.isArray(v2.entries)?v2.entries:[];
      archived=Array.isArray(v2.archived)?v2.archived:[];
      autoListen=v2.autoListen!==false;
      raceCounter=v2.raceCounter||1;
      return;
    }
    var v1=JSON.parse(localStorage.getItem("finishline")||"null");
    if(v1){
      entries=Array.isArray(v1.entries)?v1.entries:[];
      raceStart=v1.raceStart||null;
      autoListen=v1.autoListen!==false;
    }
  }catch(e){}
})();
if(!raceName)raceName=defaultName(raceCounter);

function save(){try{localStorage.setItem("finishline_v2",JSON.stringify({
  raceName:raceName,raceStart:raceStart,entries:entries,archived:archived,
  autoListen:autoListen,raceCounter:raceCounter}));}catch(e){}}

var SR=window.SpeechRecognition||window.webkitSpeechRecognition, rec=null;
var voiceOk=!!SR;
var ERR={
  "not-allowed":"microphone blocked \u2014 allow it in Settings \u203A Safari \u203A Microphone",
  "service-not-allowed":"speech unavailable \u2014 enable Settings \u203A General \u203A Keyboard \u203A Dictation",
  "audio-capture":"no microphone found",
  "network":"no connection \u2014 voice needs data; use the keypad offline",
  "no-speech":"didn't catch that \u2014 tap speak and try again",
  "aborted":""
};
function showHeard(text,isErr){
  var h=el("heard");h.textContent=text;h.className="heard"+(isErr?" err":"");
}
function startListening(){
  if(!SR){showHeard("voice not supported in this browser",true);return;}
  if(listening)return;
  try{rec&&rec.abort();}catch(e){}
  rec=new SR();rec.lang="en-GB";rec.interimResults=false;rec.maxAlternatives=1;
  rec.onresult=function(ev){
    var text=ev.results[0][0].transcript||"";
    showHeard("heard: \u201C"+text+"\u201D",false);
    var s=parseSail(text);if(s){draft=s;renderPanel();}
    else showHeard("heard \u201C"+text+"\u201D but no number in it",true);
  };
  rec.onerror=function(e){
    listening=false;
    var msg=ERR.hasOwnProperty(e.error)?ERR[e.error]:("voice error: "+e.error);
    if(msg)showHeard(msg,true);
    renderPanel();
  };
  rec.onend=function(){listening=false;renderPanel();};
  try{rec.start();listening=true;showHeard("listening\u2026",false);}
  catch(e){listening=false;showHeard("couldn't start mic \u2014 tap speak",true);}
  renderPanel();
}
function stopListening(){try{rec&&rec.stop();}catch(e){}listening=false;}

el("hdrDate").textContent=fmtDate(new Date());
el("raceName").value=raceName;
el("raceName").addEventListener("input",function(){raceName=this.value;save();});

setInterval(function(){
  var now=Date.now();
  el("clockBig").textContent=clockTime(now);
  el("clockSub").innerHTML=raceStart
    ? 'ELAPSED <b>'+elapsed(now,raceStart)+'</b> \u00B7 start '+clockTime(raceStart)
    : 'no race start set';
},250);

el("startBtn").addEventListener("click",function(){
  if(!raceStart){raceStart=Date.now();}
  else if(confirm("Clear race start time?")){raceStart=null;}
  save();renderStart();
});
function renderStart(){
  var b=el("startBtn");
  if(raceStart){b.textContent="Clear start";b.classList.add("ghost");}
  else{b.textContent="Start race now";b.classList.remove("ghost");}
}

if(voiceOk){
  el("voiceBtn").style.display="";
  el("voiceBtn").addEventListener("click",function(){autoListen=!autoListen;save();renderVoice();});
}
function renderVoice(){
  var b=el("voiceBtn");
  b.textContent="\uD83C\uDF99 voice "+(autoListen?"on":"off");
  b.classList.toggle("on",autoListen);
}

el("markBtn").addEventListener("click",function(){
  var t=Date.now();
  var id=t+"-"+Math.random().toString(36).slice(2,7);
  entries.push({id:id,t:t,sail:null});
  activeId=id;draft="";showHeard("",false);
  save();renderAll();
  if(autoListen&&voiceOk)startListening();
  if(navigator.vibrate)navigator.vibrate(30);
});

(function(){
  var keys=["1","2","3","4","5","6","7","8","9","\u232B","0","OK"];
  keys.forEach(function(k){
    var b=document.createElement("button");
    b.textContent=k;if(k==="OK")b.className="ok";
    b.addEventListener("click",function(){
      if(k==="OK"){commit();}
      else if(k==="\u232B"){draft=draft.slice(0,-1);renderPanel();}
      else if(draft.length<8){draft+=k;renderPanel();}
    });
    el("pad").appendChild(b);
  });
})();

function commit(){
  if(!activeId)return;
  var s=draft.trim();
  entries=entries.map(function(e){return e.id===activeId&&s?Object.assign({},e,{sail:s}):e;});
  activeId=null;draft="";stopListening();save();renderAll();
}
el("laterBtn").addEventListener("click",function(){
  activeId=null;draft="";stopListening();renderAll();
});
el("speakBtn").addEventListener("click",startListening);

el("clearBtn").addEventListener("click",function(){
  if(!entries.length)return;
  if(!confirm("Clear the current finish list without saving it?"))return;
  entries=[];activeId=null;draft="";save();renderAll();
});

el("newBtn").addEventListener("click",function(){
  if(entries.length){
    archived.unshift({
      id:Date.now()+"-"+Math.random().toString(36).slice(2,6),
      name:raceName||defaultName(raceCounter),
      raceStart:raceStart, entries:entries, savedAt:Date.now()
    });
    raceCounter+=1;
  }
  entries=[];activeId=null;draft="";raceStart=null;
  raceName=defaultName(raceCounter);
  el("raceName").value=raceName;
  save();renderAll();
});

function buildCsv(ents,start){
  var rows=[["Position","Sail number","Finish time","Elapsed","Date"]];
  ents.forEach(function(e,i){
    var d=new Date(e.t);
    rows.push([String(i+1),e.sail||"",clockTime(e.t),
      start?elapsed(e.t,start):"",
      d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())]);
  });
  return rows.map(function(r){return r.map(function(c){
    return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\r\n");
}
function safeName(s){return (s||"race").replace(/[^a-z0-9]+/gi,"-").replace(/^-+|-+$/g,"").toLowerCase()||"race";}
function csvFileName(name){var d=new Date();
  return safeName(name)+"-"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+".csv";}

function exportRace(ents,start,name){
  if(!ents.length){alert("Nothing to export yet.");return;}
  var csv=buildCsv(ents,start), fname=csvFileName(name);
  try{
    var file=new File([csv],fname,{type:"text/csv"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:name||"Finish times"}).catch(function(e){
        if(e&&e.name==="AbortError")return;
        downloadCsv(csv,fname);
      });
      return;
    }
  }catch(e){}
  downloadCsv(csv,fname);
}
function downloadCsv(csv,fname){
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
}

el("exportBtn").addEventListener("click",function(){exportRace(entries,raceStart,raceName);});
el("copyBtn").addEventListener("click",function(){
  if(!entries.length){alert("Nothing to copy yet.");return;}
  navigator.clipboard.writeText(buildCsv(entries,raceStart)).then(
    function(){alert("CSV copied to clipboard");},
    function(){alert("Copy failed \u2014 use Export instead");});
});

function renderPanel(){
  var e=entries.find(function(x){return x.id===activeId;});
  el("panel").style.display=e?"":"none";
  if(!e)return;
  el("lockedTime").textContent=clockTime(e.t);
  el("draft").innerHTML=draft?draft:'<span class="ph">sail no.</span>';
  el("listenTag").style.display=listening?"":"none";
  el("speakBtn").style.display=(voiceOk&&!listening)?"":"none";
}
function renderList(){
  var n=entries.length;
  el("countLbl").textContent="FINISHES ("+n+")";
  el("clearBtn").style.display=n?"":"none";
  el("newBtn").style.display=n?"":"none";
  el("bar").style.display=n?"flex":"none";
  var pending=entries.filter(function(e){return !e.sail&&e.id!==activeId;}).length;
  el("hint").innerHTML="tap the moment the boat crosses \u2014 time is locked to the second"
    +(pending?" \u00B7 <b>"+pending+" awaiting number</b>":"");
  var list=el("list");list.innerHTML="";
  if(!n){list.innerHTML='<div class="empty">No finishes yet \u2014 first boat over the line starts the list.</div>';return;}
  entries.map(function(e,i){return Object.assign({pos:i+1},e);}).reverse().forEach(function(e){
    var row=document.createElement("div");
    row.className="entry"+(e.sail?"":" pending");
    var posD=document.createElement("div");posD.className="pos mono";posD.textContent=e.pos;
    var sailB=document.createElement("button");sailB.className="sail";
    sailB.textContent=e.sail||"tap to add no.";
    sailB.addEventListener("click",function(){
      activeId=e.id;draft=e.sail||"";showHeard("",false);renderAll();
      if(!e.sail&&autoListen&&voiceOk)startListening();
    });
    var times=document.createElement("div");times.className="times";
    times.innerHTML='<div class="t mono">'+clockTime(e.t)+'</div>'
      +(raceStart?'<div class="e mono">'+elapsed(e.t,raceStart)+'</div>':'');
    var del=document.createElement("button");del.className="del";del.textContent="\u2715";
    del.addEventListener("click",function(){
      entries=entries.filter(function(x){return x.id!==e.id;});
      if(activeId===e.id){activeId=null;draft="";stopListening();}
      save();renderAll();
    });
    row.appendChild(posD);row.appendChild(sailB);row.appendChild(times);row.appendChild(del);
    list.appendChild(row);
  });
}
function renderArch(){
  el("archWrap").style.display=archived.length?"":"none";
  var wrap=el("archList");wrap.innerHTML="";
  archived.forEach(function(r){
    var card=document.createElement("div");card.className="rcard";
    var info=document.createElement("div");info.className="info";
    var named=r.entries.filter(function(e){return e.sail;}).length;
    info.innerHTML='<div class="nm"></div><div class="meta">'
      +r.entries.length+' finish'+(r.entries.length===1?"":"es")
      +(named<r.entries.length?" \u00B7 "+(r.entries.length-named)+" without number":"")
      +' \u00B7 '+shortDate(r.savedAt)+'</div>';
    info.querySelector(".nm").textContent=r.name;
    var exp=document.createElement("button");exp.className="exp";exp.textContent="Export";
    exp.addEventListener("click",function(){exportRace(r.entries,r.raceStart,r.name);});
    var del=document.createElement("button");del.className="del";del.textContent="\u2715";
    del.addEventListener("click",function(){
      if(!confirm("Delete saved race \u201C"+r.name+"\u201D? Export it first if you need the data."))return;
      archived=archived.filter(function(x){return x.id!==r.id;});
      save();renderArch();
    });
    card.appendChild(info);card.appendChild(exp);card.appendChild(del);
    wrap.appendChild(card);
  });
}
function renderAll(){renderStart();renderVoice();renderPanel();renderList();renderArch();}
renderAll();
})();
</script>
</body>
</html>
